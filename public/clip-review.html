<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clip Review</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #101410;
        color: #f4f7f2;
      }

      main {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      video {
        width: min(100%, 980px);
        max-height: 72vh;
        background: #000;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 10px 12px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <video
        id="clip"
        src="/local-clips/videoplayback.mp4"
        controls
        muted
        playsinline
        preload="auto"
      ></video>
      <div class="controls">
        <button data-seek="0">0%</button>
        <button data-seek="0.2">20%</button>
        <button data-seek="0.35">35%</button>
        <button data-seek="0.5">50%</button>
        <button data-seek="0.65">65%</button>
        <button data-seek="0.8">80%</button>
        <button data-seek="0.95">95%</button>
      </div>
      <p id="readout">Loading...</p>
    </main>
    <script>
      const clip = document.querySelector("#clip");
      const readout = document.querySelector("#readout");

      function updateReadout() {
        readout.textContent = `time ${clip.currentTime.toFixed(2)} / ${Number.isFinite(clip.duration) ? clip.duration.toFixed(2) : "?"} seconds`;
      }

      function seekRatio(ratio) {
        if (!Number.isFinite(clip.duration) || clip.duration <= 0) return;
        clip.pause();
        clip.currentTime = Math.max(0, Math.min(clip.duration - 0.05, clip.duration * ratio));
        updateReadout();
      }

      clip.addEventListener("loadedmetadata", updateReadout);
      clip.addEventListener("timeupdate", updateReadout);
      clip.addEventListener("seeked", updateReadout);

      for (const button of document.querySelectorAll("button[data-seek]")) {
        button.addEventListener("click", () => {
          seekRatio(Number(button.dataset.seek));
        });
      }

      if (clip.readyState >= 1) updateReadout();
      const seek = Number(new URLSearchParams(window.location.search).get("seek"));
      if (Number.isFinite(seek)) {
        clip.addEventListener("loadedmetadata", () => seekRatio(seek), { once: true });
        if (clip.readyState >= 1) seekRatio(seek);
      }
    </script>
  </body>
</html>
